<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=/verify.html" />
  <title>Redirecting to Receipt Verification - runlocal.tools</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/design-tokens.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        linear-gradient(rgba(54, 42, 32, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(54, 42, 32, 0.028) 1px, transparent 1px),
        var(--bg);
      background-size: 72px 72px, 72px 72px, auto;
      font-family: var(--rlt-font-sans);
      line-height: 1.5;
    }

    main {
      width: min(100%, 560px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 250, 241, 0.74);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border: 1px solid var(--green-dark);
      border-radius: var(--radius);
      background: var(--green);
      color: var(--paper);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Receipt verification moved.</h1>
    <p>This route now points to the canonical receipt verification page.</p>
    <a id="verifyLink" href="/verify.html">Open Receipt Verification</a>
  </main>

  <script>
    const target = new URL("/verify.html", window.location.origin);
    target.search = window.location.search;
    document.getElementById("verifyLink").href = target.toString();
    window.location.replace(target.toString());
  </script>
</body>
</html>
