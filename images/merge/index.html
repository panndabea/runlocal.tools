<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Combiner</title>
    <script src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        align-items: center;
        background: #f0f2f5;
        color: #1a1a2e;
        display: flex;
        flex-direction: column;
        font-family: system-ui, sans-serif;
        min-height: 100vh;
        padding: 2rem 1rem;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 0.25rem;
      }

      .subtitle {
        color: #555;
        margin-bottom: 2rem;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 640px;
        padding: 2rem;
        width: 100%;
      }

      .drop-zone {
        border: 2px dashed #a0a8b8;
        border-radius: 8px;
        cursor: pointer;
        padding: 2rem;
        text-align: center;
        transition:
          border-color 0.2s,
          background 0.2s;
      }

      .drop-zone.dragover,
      .drop-zone:hover {
        background: #f0f6ff;
        border-color: #4f8ef7;
      }

      .drop-zone svg {
        color: #4f8ef7;
        height: 48px;
        margin-bottom: 0.75rem;
        width: 48px;
      }

      .drop-zone p {
        color: #555;
      }

      .drop-zone span {
        color: #4f8ef7;
        font-weight: 600;
      }

      #file-input {
        display: none;
      }

      #preview-grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        margin-top: 1.25rem;
      }

      .thumb-wrap {
        aspect-ratio: 1;
        background: #eee;
        border-radius: 6px;
        overflow: hidden;
        position: relative;
      }

      .thumb-wrap img {
        height: 100%;
        object-fit: cover;
        width: 100%;
      }

      .thumb-wrap button {
        align-items: center;
        background: rgba(0, 0, 0, 0.55);
        border: none;
        border-radius: 50%;
        color: #fff;
        cursor: pointer;
        display: flex;
        font-size: 0.75rem;
        height: 22px;
        justify-content: center;
        line-height: 1;
        position: absolute;
        right: 4px;
        top: 4px;
        width: 22px;
      }

      .controls {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-top: 1.25rem;
      }

      .layout-label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      #layout {
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 0.9rem;
        padding: 0.4rem 0.75rem;
      }

      #combine-btn {
        background: #4f8ef7;
        border: none;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        margin-left: auto;
        padding: 0.65rem 1.5rem;
        transition: background 0.2s;
      }

      #combine-btn:hover {
        background: #2f6fd6;
      }

      #combine-btn:disabled {
        background: #aac4f7;
        cursor: not-allowed;
      }

      #status {
        color: #555;
        font-size: 0.9rem;
        margin-top: 1rem;
        min-height: 1.2em;
      }

      #status.error {
        color: #e05;
      }

      #top-progress {
        height: 3px;
        left: 0;
        opacity: 0;
        pointer-events: none;
        position: fixed;
        top: 0;
        transition: opacity 0.25s;
        width: 100%;
        z-index: 1000;
      }

      #top-progress.active {
        opacity: 1;
      }

      #top-progress-fill {
        background: linear-gradient(90deg, #4f8ef7 0, #a78bfa 50%, #4f8ef7 100%);
        background-size: 200% 100%;
        border-radius: 0 2px 2px 0;
        height: 100%;
        transition: width 0.4s ease;
        width: 0%;
      }

      #top-progress.active #top-progress-fill {
        animation: progress-shimmer 1.8s linear infinite;
      }

      @keyframes progress-shimmer {
        from {
          background-position: 0 0;
        }

        to {
          background-position: 200% 0;
        }
      }

      #processing-state {
        align-items: center;
        background: #f4f7ff;
        border: 1px solid #dce6ff;
        border-radius: 8px;
        color: #3a4a6b;
        display: none;
        font-size: 0.9rem;
        gap: 0.75rem;
        margin-top: 1rem;
        padding: 0.75rem 1rem;
      }

      #processing-state.visible {
        display: flex;
      }

      .spinner {
        animation: spin 0.8s linear infinite;
        border: 2.5px solid #c7d7f9;
        border-radius: 50%;
        border-top-color: #4f8ef7;
        flex-shrink: 0;
        height: 18px;
        width: 18px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .processing-label {
        flex: 1;
      }

      .eta-badge {
        background: #dce9ff;
        border-radius: 999px;
        color: #4f8ef7;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        min-width: 3.5rem;
        padding: 0.15rem 0.65rem;
        text-align: center;
        transition: background 0.3s;
      }

      .eta-badge.done {
        background: #d4f7e6;
        color: #2ecc71;
      }

      #preprocess-state {
        align-items: center;
        background: #f4f7ff;
        border: 1px solid #dce6ff;
        border-radius: 8px;
        color: #3a4a6b;
        display: none;
        font-size: 0.9rem;
        gap: 0.75rem;
        margin-top: 1rem;
        padding: 0.75rem 1rem;
      }

      #preprocess-state.visible {
        display: flex;
      }

      #selection-summary {
        color: #4b5f89;
        font-size: 0.9rem;
        margin-top: 0.5rem;
        min-height: 1.2rem;
      }

      #preprocess-progress {
        background: #dce6ff;
        border-radius: 999px;
        flex: 1;
        height: 6px;
        overflow: hidden;
      }

      #preprocess-progress-fill {
        background: linear-gradient(90deg, #4f8ef7, #a78bfa);
        border-radius: 999px;
        height: 100%;
        transition: width 0.25s ease;
        width: 0%;
      }

      #result-section {
        display: none;
        margin-top: 2rem;
        max-width: 640px;
        width: 100%;
      }

      #result-section h2 {
        margin-bottom: 0.75rem;
      }

      #result-img {
        border-radius: 10px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
        display: block;
        height: auto;
        margin: 0 auto;
        max-width: 420px;
        width: 100%;
      }

      .download-options {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .dl-btn {
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: inline-flex;
        flex-direction: column;
        font-size: 0.9rem;
        font-weight: 600;
        gap: 0.2rem;
        min-width: 140px;
        padding: 0.65rem 1.3rem;
        position: relative;
        text-decoration: none;
        transition: background 0.2s;
      }

      .dl-btn-title {
        align-items: center;
        display: flex;
        font-size: 1rem;
        gap: 0.35rem;
      }

      .dl-btn-meta {
        font-size: 0.75rem;
        font-weight: 400;
        min-height: 1.1em;
        opacity: 0.85;
      }

      .dl-btn-png {
        background: #4f8ef7;
        color: #fff;
      }

      .dl-btn-png:hover {
        background: #2f6fd6;
      }

      .dl-btn-webp {
        background: #2ecc71;
        color: #fff;
      }

      .dl-btn-webp:hover {
        background: #27ae60;
      }

      .dl-btn-min {
        background: #8b5cf6;
        color: #fff;
      }

      .dl-btn-min:hover {
        background: #7c3aed;
      }

      .savings-badge {
        background: #e8318a;
        border-radius: 999px;
        color: #fff;
        display: none;
        font-size: 0.7rem;
        font-weight: 700;
        line-height: 1.4;
        padding: 0.1rem 0.45rem;
        position: absolute;
        right: -9px;
        top: -9px;
        white-space: nowrap;
      }

      .savings-badge.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="top-progress">
      <div id="top-progress-fill"></div>
    </div>

    <h1>🖼️ Image Combiner</h1>
    <p class="subtitle">Upload multiple images and merge them into one</p>

    <div class="card">
      <div id="drop-zone" class="drop-zone" role="button" tabindex="0" aria-label="Select images">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"
          />
        </svg>
        <p><span>Click to select</span> or drag &amp; drop images here</p>
        <p style="font-size: 0.8rem; margin-top: 0.5rem; color: #888">
          PNG, JPG, WEBP, HEIC — processed locally in your browser
        </p>
      </div>

      <input id="file-input" type="file" accept="image/*,.heic,.heif" multiple />

      <div id="preview-grid"></div>

      <div class="controls">
        <label class="layout-label" for="layout">Layout:</label>
        <select id="layout">
          <option value="horizontal">Horizontal (side by side)</option>
          <option value="vertical">Vertical (stacked)</option>
        </select>
        <button id="combine-btn" disabled>Combine Images</button>
      </div>

      <div id="status" aria-live="polite"></div>
      <div id="selection-summary" role="status"></div>

      <div id="preprocess-state" role="status" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span id="preprocess-label" class="processing-label">Preprocessing images…</span>
        <div id="preprocess-progress" aria-hidden="true">
          <div id="preprocess-progress-fill"></div>
        </div>
      </div>

      <div id="processing-state">
        <span class="spinner" aria-hidden="true"></span>
        <span id="processing-label" class="processing-label">Processing images…</span>
        <span id="eta-badge" class="eta-badge"></span>
      </div>
    </div>

    <div id="result-section">
      <h2>Combined Result</h2>
      <img id="result-img" alt="Combined image" />
      <br />
      <div class="download-options">
        <a id="download-btn" class="dl-btn dl-btn-png" download="combined.png">
          <span class="dl-btn-title">⬇ PNG</span>
          <span id="png-size" class="dl-btn-meta"></span>
        </a>

        <a id="download-webp-btn" class="dl-btn dl-btn-webp" download="combined.webp">
          <span class="dl-btn-title"
            >⬇ WebP
            <span id="savings-badge" class="savings-badge"></span>
          </span>
          <span id="webp-size" class="dl-btn-meta">Optimizing…</span>
        </a>

        <a id="download-min-btn" class="dl-btn dl-btn-min" download="combined">
          <span class="dl-btn-title"
            >⬇ Smallest
            <span id="min-savings-badge" class="savings-badge"></span>
          </span>
          <span id="min-size" class="dl-btn-meta">Optimizing…</span>
        </a>
      </div>
    </div>

    <script>
      const MB_IN_BYTES = 1024 * 1024;
      const KB_IN_BYTES = 1024;

      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      const previewGrid = document.getElementById("preview-grid");
      const layoutSelect = document.getElementById("layout");
      const combineButton = document.getElementById("combine-btn");
      const statusElement = document.getElementById("status");
      const selectionSummary = document.getElementById("selection-summary");

      const resultSection = document.getElementById("result-section");
      const resultImage = document.getElementById("result-img");
      const downloadButton = document.getElementById("download-btn");
      const downloadWebpButton = document.getElementById("download-webp-btn");

      const pngSizeElement = document.getElementById("png-size");
      const webpSizeElement = document.getElementById("webp-size");
      const savingsBadge = document.getElementById("savings-badge");

      const downloadMinButton = document.getElementById("download-min-btn");
      const minSizeElement = document.getElementById("min-size");
      const minSavingsBadge = document.getElementById("min-savings-badge");

      const topProgress = document.getElementById("top-progress");
      const topProgressFill = document.getElementById("top-progress-fill");
      const processingState = document.getElementById("processing-state");
      const processingLabel = document.getElementById("processing-label");
      const etaBadge = document.getElementById("eta-badge");

      const preprocessState = document.getElementById("preprocess-state");
      const preprocessLabel = document.getElementById("preprocess-label");
      const preprocessProgressFill = document.getElementById("preprocess-progress-fill");

      let files = [];
      let currentResultUrl = null;
      let currentWebpUrl = null;
      let currentMinUrl = null;

      let activeWorker = null;
      let activeWorkerUrl = null;

      let countdownInterval = null;
      let progressAnimationFrameId = null;
      let processStartTime = 0;
      let preprocessEstimatedSeconds = 0;

      /**
       * @param {number} sizeInBytes
       * @returns {string}
       */
      function formatFileSize(sizeInBytes) {
        if (sizeInBytes >= MB_IN_BYTES) {
          return `${(sizeInBytes / MB_IN_BYTES).toFixed(1)} MB`;
        }

        return `${Math.round(sizeInBytes / KB_IN_BYTES)} KB`;
      }

      /**
       * @param {File[]} selectedFiles
       */
      async function addFiles(selectedFiles) {
        const validFiles = [...selectedFiles].filter((f) => {
          const isHeic =
            f.type === "image/heic" ||
            f.type === "image/heif" ||
            /\.(heic|heif)$/i.test(f.name);
          return isHeic || f.type.startsWith("image/");
        });

        if (validFiles.length === 0) return;

        const total = validFiles.length;
        const combinedFileCount = files.filter(Boolean).length + total;
        const estimatedPreprocessSeconds = estimatePreprocessSeconds(validFiles);
        selectionSummary.textContent = `Selected ${pluralImages(combinedFileCount)} — preprocessing about ${estimatedPreprocessSeconds}s`;
        let processed = 0;
        showPreprocessUI(total, estimatedPreprocessSeconds);
        // Yield to the browser so it can paint the initial preprocessing state
        // before the queue loop starts consuming the JS thread.
        await new Promise((resolve) => setTimeout(resolve, 0));

        // Concurrency-limited parallel queue: up to 8 files at once.
        const CONCURRENCY = 8;
        const queue = [...validFiles];
        const resultFiles = [];

        const processOne = async (file) => {
          const isHeic =
            file.type === "image/heic" ||
            file.type === "image/heif" ||
            /\.(heic|heif)$/i.test(file.name);

          if (isHeic) {
            try {
              const result = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.92 });
              const blobs = Array.isArray(result) ? result : [result];
              blobs.forEach((convertedBlob, blobIndex) => {
                const suffix = blobs.length > 1 ? `-${blobIndex + 1}` : "";
                resultFiles.push(
                  new File(
                    [convertedBlob],
                    file.name.replace(/\.(heic|heif)$/i, `${suffix}.jpg`),
                    { type: "image/jpeg" },
                  ),
                );
              });
            } catch {
              statusElement.textContent = `Could not convert HEIC file: ${file.name}`;
              statusElement.classList.add("error");
            }
          } else {
            resultFiles.push(file);
          }

          processed += 1;
          updatePreprocessUI(processed, total);
        };

        // Launch parallel workers that drain the shared queue.
        await Promise.all(
          Array.from({ length: Math.min(CONCURRENCY, total) }, async () => {
            while (queue.length > 0) {
              await processOne(queue.shift());
            }
          }),
        );

        // Batch all thumbnail DOM insertions in one operation to minimise reflows.
        const fragment = document.createDocumentFragment();
        for (const file of resultFiles) {
          files.push(file);
          fragment.appendChild(renderThumb(file, files.length - 1));
        }
        previewGrid.appendChild(fragment);

        hidePreprocessUI();
        updateCombineButtonState();
        updateSelectionSummary();
      }

      /**
       * @param {File} file
       * @param {number} index
       * @returns {HTMLDivElement}
       */
      function renderThumb(file, index) {
        const thumbnailUrl = URL.createObjectURL(file);

        const thumbWrap = document.createElement("div");
        thumbWrap.className = "thumb-wrap";
        thumbWrap.dataset.index = String(index);
        thumbWrap.dataset.url = thumbnailUrl;

        const image = document.createElement("img");
        image.src = thumbnailUrl;
        image.alt = "preview";
        image.loading = "lazy";

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.title = "Remove";
        removeButton.textContent = "✕";
        removeButton.addEventListener("click", () => removeFile(thumbWrap));

        thumbWrap.append(image, removeButton);
        return thumbWrap;
      }

      /**
       * @param {HTMLDivElement} thumbWrap
       */
      function removeFile(thumbWrap) {
        const index = Number.parseInt(thumbWrap.dataset.index, 10);
        files[index] = null;

        if (thumbWrap.dataset.url) {
          URL.revokeObjectURL(thumbWrap.dataset.url);
        }

        thumbWrap.remove();
        updateCombineButtonState();
        updateSelectionSummary();
      }

      function updateCombineButtonState() {
        const activeFileCount = files.filter(Boolean).length;
        combineButton.disabled = activeFileCount < 2;
        statusElement.textContent = "";
        statusElement.classList.remove("error");
      }

      function updateSelectionSummary() {
        const activeFileCount = files.filter(Boolean).length;
        if (activeFileCount === 0) {
          selectionSummary.textContent = "";
          return;
        }

        selectionSummary.textContent = `${pluralImages(activeFileCount)} ready to combine`;
      }

      /**
       * @param {File[]} imageFiles
       * @returns {number}
       */
      function estimateSeconds(imageFiles) {
        const totalMegabytes = imageFiles.reduce((sum, file) => sum + file.size, 0) / MB_IN_BYTES;
        return Math.max(3, Math.min(20, Math.round(2 + 0.6 * imageFiles.length + 1.5 * totalMegabytes)));
      }

      /**
       * @param {File[]} imageFiles
       * @returns {number}
       */
      function estimatePreprocessSeconds(imageFiles) {
        const totalMegabytes = imageFiles.reduce((sum, file) => sum + file.size, 0) / MB_IN_BYTES;
        const heicCount = imageFiles.filter((file) =>
          file.type === "image/heic" ||
          file.type === "image/heif" ||
          /\.(heic|heif)$/i.test(file.name),
        ).length;

        // Tuned from manual profiling across typical desktop/mobile browsers:
        // - 0.25s baseline per file for decode/thumbnail work
        // - 0.3s per MB for IO/decode variance
        // - +1.4s per HEIC for conversion overhead
        // Result is clamped to 1..45s to avoid noisy under/over-estimates.
        return Math.max(1, Math.min(45, Math.round(0.25 * imageFiles.length + 0.3 * totalMegabytes + 1.4 * heicCount)));
      }

      /**
       * @param {number} count
       * @returns {string}
       */
      function pluralImages(count) {
        return `${count} image${count !== 1 ? "s" : ""}`;
      }

      /**
       * @param {number} total
       */
      function showPreprocessUI(total, estimatedSeconds) {
        preprocessEstimatedSeconds = estimatedSeconds;
        preprocessLabel.textContent = `Preprocessing 0 / ${pluralImages(total)} (about ${estimatedSeconds}s)…`;
        preprocessProgressFill.style.width = "0%";
        preprocessState.classList.add("visible");
      }

      /**
       * @param {number} done
       * @param {number} total
       */
      function updatePreprocessUI(done, total) {
        if (total === 0) {
          return;
        }

        const remainingSeconds = Math.max(0, Math.ceil(((total - done) / total) * preprocessEstimatedSeconds));
        const suffix = remainingSeconds > 0 ? ` (~${remainingSeconds}s left)` : "";
        preprocessLabel.textContent = `Preprocessing ${done} / ${pluralImages(total)}${suffix}…`;
        preprocessProgressFill.style.width = `${Math.round((done / total) * 100)}%`;
      }

      function hidePreprocessUI() {
        preprocessEstimatedSeconds = 0;
        preprocessState.classList.remove("visible");
      }

      function handleDropZoneClick() {
        fileInput.click();
      }

      /**
       * @param {KeyboardEvent} event
       */
      function handleDropZoneKeyDown(event) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          fileInput.click();
        }
      }

      /**
       * @param {DragEvent} event
       */
      function handleDragOver(event) {
        event.preventDefault();
        dropZone.classList.add("dragover");
      }

      function handleDragLeave() {
        dropZone.classList.remove("dragover");
      }

      /**
       * @param {DragEvent} event
       */
      function handleDrop(event) {
        event.preventDefault();
        dropZone.classList.remove("dragover");
        addFiles([...event.dataTransfer.files]);
      }

      function handleFileInputChange() {
        addFiles([...fileInput.files]);
        fileInput.value = "";
      }

      dropZone.addEventListener("click", handleDropZoneClick);
      dropZone.addEventListener("keydown", handleDropZoneKeyDown);
      dropZone.addEventListener("dragover", handleDragOver);
      dropZone.addEventListener("dragleave", handleDragLeave);
      dropZone.addEventListener("drop", handleDrop);
      fileInput.addEventListener("change", handleFileInputChange);

      /**
       * @param {number} estimatedSeconds
       * @param {number} fileCount
       */
      function startProcessingUI(estimatedSeconds, fileCount) {
        topProgressFill.style.transition = "none";
        topProgressFill.style.width = "0%";
        // Force reflow so the transition restart is applied reliably.
        topProgressFill.offsetWidth;
        topProgressFill.style.transition = "width .4s ease";

        topProgress.classList.add("active");
        topProgressFill.style.width = "5%";

        processingLabel.textContent = `Processing ${pluralImages(fileCount)}…`;
        etaBadge.textContent = `~${estimatedSeconds}s`;
        etaBadge.classList.remove("done");
        processingState.classList.add("visible");

        let remainingSeconds = estimatedSeconds;
        countdownInterval = window.setInterval(() => {
          remainingSeconds -= 1;

          if (remainingSeconds <= 0) {
            etaBadge.textContent = "almost…";
            clearInterval(countdownInterval);
            countdownInterval = null;
            return;
          }

          etaBadge.textContent = `~${remainingSeconds}s`;
        }, 1000);

        processStartTime = performance.now();
        const totalDurationMs = estimatedSeconds * 1000;

        const animateProgress = (time) => {
          const ratio = Math.min((time - processStartTime) / totalDurationMs, 1);
          const easedRatio = 1 - Math.pow(1 - ratio, 2);
          topProgressFill.style.width = `${5 + 80 * easedRatio}%`;

          if (ratio < 1) {
            progressAnimationFrameId = window.requestAnimationFrame(animateProgress);
          }
        };

        progressAnimationFrameId = window.requestAnimationFrame(animateProgress);
      }

      function stopProcessingUI() {
        clearInterval(countdownInterval);
        countdownInterval = null;

        window.cancelAnimationFrame(progressAnimationFrameId);
        progressAnimationFrameId = null;

        topProgressFill.style.width = "100%";

        window.setTimeout(() => {
          topProgress.classList.remove("active");

          window.setTimeout(() => {
            topProgressFill.style.width = "0%";
          }, 300);
        }, 400);

        processingState.classList.remove("visible");
      }

      /**
       * @param {boolean} enabled
       */
      function setWebpButtonEnabled(enabled) {
        if (enabled) {
          downloadWebpButton.removeAttribute("aria-disabled");
          downloadWebpButton.removeAttribute("role");
          return;
        }

        downloadWebpButton.removeAttribute("href");
        downloadWebpButton.setAttribute("aria-disabled", "true");
        downloadWebpButton.setAttribute("role", "button");
      }

      /**
       * @param {boolean} enabled
       */
      function setMinButtonEnabled(enabled) {
        if (enabled) {
          downloadMinButton.removeAttribute("aria-disabled");
          downloadMinButton.removeAttribute("role");
          return;
        }

        downloadMinButton.removeAttribute("href");
        downloadMinButton.setAttribute("aria-disabled", "true");
        downloadMinButton.setAttribute("role", "button");
      }

      /**
       * @param {File[]} imageFiles
       * @param {"horizontal" | "vertical"} layout
       * @param {(done: number, total: number) => void} [onProgress]
       * @returns {Promise<{pngBlob: Blob, webpBlob: Blob | null, minBlob: Blob | null, minType: string | null}>}
       */
      function combineImages(imageFiles, layout, onProgress) {
        if (imageFiles.length === 0) {
          return Promise.reject(new Error("No images to combine."));
        }

        return new Promise((resolve, reject) => {
          const workerCode = `
            self.onmessage = async ({ data: { files, layout } }) => {
              let canvas = null;
              let context = null;
              try {
                // Two-pass streaming: we never hold more than one decoded bitmap
                // in memory at a time, so peak RAM is (canvas + 1 bitmap) rather
                // than (canvas + all bitmaps at once).

                // Pass 1 — measure every image one at a time.
                // Decode → record dimensions → close immediately.
                // Dimensions are stored as a flat Int32Array (C-style packed array)
                // rather than an array of objects, avoiding per-element heap allocation.
                const dimBuf = new Int32Array(files.length * 2);
                for (let i = 0; i < files.length; i++) {
                  const bitmap = await createImageBitmap(files[i]);
                  dimBuf[i * 2]     = bitmap.width;
                  dimBuf[i * 2 + 1] = bitmap.height;
                  bitmap.close();
                }

                let sourceCanvasWidth;
                let sourceCanvasHeight;

                if (layout === "vertical") {
                  sourceCanvasWidth = 0;
                  sourceCanvasHeight = 0;
                  for (let i = 0; i < files.length; i++) {
                    if (dimBuf[i * 2] > sourceCanvasWidth) sourceCanvasWidth = dimBuf[i * 2];
                    sourceCanvasHeight += dimBuf[i * 2 + 1];
                  }
                } else {
                  sourceCanvasWidth = 0;
                  sourceCanvasHeight = 0;
                  for (let i = 0; i < files.length; i++) {
                    sourceCanvasWidth += dimBuf[i * 2];
                    if (dimBuf[i * 2 + 1] > sourceCanvasHeight) sourceCanvasHeight = dimBuf[i * 2 + 1];
                  }
                }

                // Keep output within conservative cross-browser canvas limits so
                // large image batches still work in Firefox/Safari.
                const MAX_CANVAS_EDGE = 16384;
                const MAX_CANVAS_PIXELS = 67000000;
                const edgeScale = Math.min(
                  1,
                  MAX_CANVAS_EDGE / sourceCanvasWidth,
                  MAX_CANVAS_EDGE / sourceCanvasHeight
                );
                const areaScale = Math.min(
                  1,
                  Math.sqrt(MAX_CANVAS_PIXELS / (sourceCanvasWidth * sourceCanvasHeight))
                );
                const scale = Math.min(edgeScale, areaScale);

                const canvasWidth = Math.max(1, Math.round(sourceCanvasWidth * scale));
                const canvasHeight = Math.max(1, Math.round(sourceCanvasHeight * scale));

                // willReadFrequently: false tells the browser it never needs to keep
                // a CPU-readable shadow copy of the canvas pixels — the raster lives
                // only in GPU memory until convertToBlob pulls it out, which halves
                // the RGBA backing store RAM compared to a default context.
                canvas = new OffscreenCanvas(canvasWidth, canvasHeight);
                context = canvas.getContext("2d", { willReadFrequently: false });

                context.fillStyle = "#ffffff";
                context.fillRect(0, 0, canvasWidth, canvasHeight);

                // Pass 2 — draw every image one at a time.
                // Decode → draw → close immediately before loading the next one.
                let x = 0;
                let y = 0;
                for (let i = 0; i < files.length; i++) {
                  const bitmap = await createImageBitmap(files[i]);
                  const drawWidth = Math.max(1, Math.round(dimBuf[i * 2] * scale));
                  const drawHeight = Math.max(1, Math.round(dimBuf[i * 2 + 1] * scale));
                  context.drawImage(bitmap, x, y, drawWidth, drawHeight);
                  bitmap.close();
                  if (layout === "vertical") {
                    y += drawHeight;
                  } else {
                    x += drawWidth;
                  }
                  self.postMessage({ progress: i + 1, total: files.length });
                }

                // Encode PNG and preview WebP in parallel — both read from the same
                // immutable canvas pixels so there is no data hazard.
                const WEBP_PREVIEW_QUALITY = 0.86;
                const [pngBlob, webpBlob] = await Promise.all([
                  canvas.convertToBlob({ type: "image/png" }),
                  canvas.convertToBlob({ type: "image/webp", quality: WEBP_PREVIEW_QUALITY })
                    .then((b) => (b.type === "image/webp" ? b : null))
                    .catch(() => null),
                ]);

                // Generate minimal blob from more aggressive lossy candidates.
                // ~20MP raw RGBA is about 80MB, which is where browser memory pressure rises.
                const HUGE_CANVAS_PIXEL_THRESHOLD = 20_000_000;
                // Very large canvases are memory heavy in browsers, so also try
                // downscaled candidates when the output exceeds ~20 MP.
                const isHugeOutput = canvasWidth * canvasHeight > HUGE_CANVAS_PIXEL_THRESHOLD;
                // Benchmarks in README used 42-image workloads and showed that
                // batches at/above 21 images benefit from a lower-pressure encode path.
                const isLargeBatch = files.length >= 21;
                const scaleCandidates = isLargeBatch
                  ? (isHugeOutput ? [1, 0.9] : [1])
                  : (isHugeOutput ? [1, 0.9, 0.8] : [1, 0.9]);
                // Quality ladders are stepped from visually acceptable down to
                // aggressive compression, then we pick the smallest output.
                const lossyTargets = isLargeBatch
                  ? [
                    // Benchmarked heavy-batch quality pair: best speed/memory trade-off.
                    { type: "image/jpeg", qualities: [0.70], ext: "jpg" },
                    { type: "image/webp", qualities: [0.62], ext: "webp" },
                  ]
                  : [
                    { type: "image/jpeg", qualities: [0.72, 0.62, 0.52], ext: "jpg" },
                    { type: "image/webp", qualities: [0.68, 0.56, 0.46], ext: "webp" },
                  ];

                // C memory-pool pattern: allocate one scaled canvas per resolution
                // level and reuse it for every format×quality encoding at that scale.
                // This keeps peak allocation to (output canvas + 1 scale canvas) instead
                // of (output canvas + N canvases for N format×quality combos).
                const minCandidates = [];
                for (const scale of scaleCandidates) {
                  let pool = null;

                  if (scale < 1) {
                    const sw = Math.max(1, Math.round(canvasWidth * scale));
                    const sh = Math.max(1, Math.round(canvasHeight * scale));
                    pool = new OffscreenCanvas(sw, sh);
                    const poolCtx = pool.getContext("2d", { willReadFrequently: false });
                    // High-quality Lanczos-like downscale via the browser compositor.
                    poolCtx.imageSmoothingEnabled = true;
                    poolCtx.imageSmoothingQuality = "high";
                    poolCtx.drawImage(canvas, 0, 0, sw, sh);
                  }

                  const src = pool ?? canvas;

                  if (isLargeBatch) {
                    // Serialize heavy-batch lossy encodes to avoid codec-memory
                    // spikes in Firefox/Safari when many images are combined.
                    for (const { type, qualities, ext } of lossyTargets) {
                      for (const quality of qualities) {
                        const candidate = await src.convertToBlob({ type, quality })
                          .then((b) => (b.type === type ? { blob: b, ext } : null))
                          .catch(() => null);
                        if (candidate) minCandidates.push(candidate);
                      }
                    }
                  } else {
                    // Encode all format×quality combos for this scale concurrently —
                    // they all read from the same immutable src pixels (no data hazard).
                    const results = await Promise.all(
                      lossyTargets.flatMap(({ type, qualities, ext }) =>
                        qualities.map((quality) =>
                          src.convertToBlob({ type, quality })
                            .then((b) => (b.type === type ? { blob: b, ext } : null))
                            .catch(() => null)
                        )
                      )
                    );

                    for (const r of results) {
                      if (r) minCandidates.push(r);
                    }
                  }

                  // Immediately free the pooled canvas (C-style explicit free).
                  if (pool) {
                    pool.width = 1;
                    pool.height = 1;
                    pool = null;
                  }
                }

                let minBlob = null;
                let minType = null;
                if (minCandidates.length > 0) {
                  const smallest = minCandidates.reduce((a, b) => (a.blob.size < b.blob.size ? a : b));
                  minBlob = smallest.blob;
                  minType = smallest.ext;
                }

                self.postMessage({
                  blob: pngBlob,
                  webpBlob,
                  minBlob,
                  minType,
                  scaled: scale < 1 ? { ratio: scale, width: canvasWidth, height: canvasHeight } : null
                });
              } catch (error) {
                self.postMessage({ error: error.message });
              } finally {
                if (canvas) {
                  // Shrink the canvas backing store to release raster/GPU memory.
                  canvas.width = 1;
                  canvas.height = 1;
                }

                context = null;
              }
            };
          `;

          const workerUrl = URL.createObjectURL(
            new Blob([workerCode], { type: "application/javascript" }),
          );

          const worker = new Worker(workerUrl);
          activeWorkerUrl = workerUrl;
          activeWorker = worker;

          worker.onmessage = ({ data }) => {
            if (data.progress !== undefined) {
              onProgress?.(data.progress, data.total);
              return;
            }

            URL.revokeObjectURL(workerUrl);
            activeWorkerUrl = null;
            activeWorker = null;
            worker.terminate();

            if (data.error) {
              reject(new Error(data.error));
              return;
            }

            resolve({
              pngBlob: data.blob,
              webpBlob: data.webpBlob,
              minBlob: data.minBlob,
              minType: data.minType,
              scaled: data.scaled,
            });
          };

          worker.onerror = (event) => {
            URL.revokeObjectURL(workerUrl);
            activeWorkerUrl = null;
            activeWorker = null;
            worker.terminate();
            reject(new Error(event.message || "Worker failed to process images."));
          };

          worker.postMessage({ files: imageFiles, layout });
        });
      }

      async function handleCombineClick() {
        const activeFiles = files.filter(Boolean);
        if (activeFiles.length < 2) {
          return;
        }

        combineButton.disabled = true;
        statusElement.textContent = "";
        resultSection.style.display = "none";

        startProcessingUI(estimateSeconds(activeFiles), activeFiles.length);

        try {
          const { pngBlob, webpBlob, minBlob, minType, scaled } = await combineImages(
            activeFiles,
            layoutSelect.value,
            (done, total) => {
              // Switch from time-based animation to real progress once data arrives.
              if (progressAnimationFrameId) {
                window.cancelAnimationFrame(progressAnimationFrameId);
                progressAnimationFrameId = null;
              }
              processingLabel.textContent = `Processing ${done} / ${pluralImages(total)}…`;
              topProgressFill.style.width = `${5 + 80 * (done / total)}%`;
            },
          );

          if (currentResultUrl) {
            URL.revokeObjectURL(currentResultUrl);
          }

          if (currentWebpUrl) {
            URL.revokeObjectURL(currentWebpUrl);
          }

          if (currentMinUrl) {
            URL.revokeObjectURL(currentMinUrl);
          }

          currentResultUrl = URL.createObjectURL(pngBlob);
          resultImage.src = currentResultUrl;
          downloadButton.href = currentResultUrl;
          pngSizeElement.textContent = formatFileSize(pngBlob.size);

          savingsBadge.classList.remove("visible");
          webpSizeElement.textContent = "Optimizing…";
          minSizeElement.textContent = "Optimizing…";
          minSavingsBadge.classList.remove("visible");

          if (webpBlob) {
            currentWebpUrl = URL.createObjectURL(webpBlob);
            downloadWebpButton.href = currentWebpUrl;
            setWebpButtonEnabled(true);

            webpSizeElement.textContent = formatFileSize(webpBlob.size);

            const savingsPercentage = pngBlob.size > 0
              ? Math.round((1 - webpBlob.size / pngBlob.size) * 100)
              : 0;

            if (savingsPercentage > 0) {
              savingsBadge.textContent = `-${savingsPercentage}%`;
              savingsBadge.classList.add("visible");
            }
          } else {
            currentWebpUrl = null;
            webpSizeElement.textContent = "Unavailable";
            setWebpButtonEnabled(false);
          }

          if (minBlob && minType) {
            currentMinUrl = URL.createObjectURL(minBlob);
            downloadMinButton.href = currentMinUrl;
            downloadMinButton.download = `combined.${minType}`;
            setMinButtonEnabled(true);

            const minSavingsPercentage = pngBlob.size > 0
              ? Math.round((1 - minBlob.size / pngBlob.size) * 100)
              : 0;

            if (minSavingsPercentage > 0) {
              minSizeElement.textContent = `${formatFileSize(minBlob.size)} (${minType.toUpperCase()})`;
              minSavingsBadge.textContent = `-${minSavingsPercentage}%`;
              minSavingsBadge.classList.add("visible");
            } else {
              minSizeElement.textContent = `${formatFileSize(minBlob.size)} (${minType.toUpperCase()}) — same as PNG`;
            }
          } else {
            currentMinUrl = null;
            minSizeElement.textContent = "Unavailable";
            setMinButtonEnabled(false);
          }

          statusElement.classList.remove("error");
          if (scaled) {
            const percent = Math.round(scaled.ratio * 100);
            statusElement.textContent = `Large output auto-scaled to ${percent}% (${scaled.width}×${scaled.height}) for browser compatibility.`;
          } else {
            statusElement.textContent = "";
          }

          resultSection.style.display = "block";
          resultSection.scrollIntoView({ behavior: "smooth" });
        } catch (error) {
          statusElement.textContent = `Error: ${error.message}`;
          statusElement.classList.add("error");
        } finally {
          stopProcessingUI();
          combineButton.disabled = false;
          updateCombineButtonState();
        }
      }

      combineButton.addEventListener("click", handleCombineClick);

      function cleanupObjectUrls() {
        if (activeWorker) {
          activeWorker.terminate();
          activeWorker = null;
        }

        if (activeWorkerUrl) {
          URL.revokeObjectURL(activeWorkerUrl);
          activeWorkerUrl = null;
        }

        const thumbnailCards = document.querySelectorAll(".thumb-wrap[data-url]");
        thumbnailCards.forEach((element) => URL.revokeObjectURL(element.dataset.url));

        if (currentResultUrl) {
          URL.revokeObjectURL(currentResultUrl);
        }

        if (currentWebpUrl) {
          URL.revokeObjectURL(currentWebpUrl);
        }

        if (currentMinUrl) {
          URL.revokeObjectURL(currentMinUrl);
        }
      }

      window.addEventListener("pagehide", cleanupObjectUrls);
    </script>
  </body>
</html>
